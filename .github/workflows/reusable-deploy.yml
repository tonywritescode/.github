# =============================================================================
# Reusable Deploy Workflow — tonycodes/.github
# =============================================================================
# Triggers a Coolify deployment via API and waits for completion.
# Coolify handles: git pull, Docker build, container restart, migrations
# (via post_deployment_command configured in Coolify).
#
# Auto-deploy is DISABLED on all Coolify apps. This workflow is the only
# deploy trigger, ensuring CI must pass before deployment.
#
# Required secrets (passed explicitly — secrets:inherit doesn't work cross-owner):
#   COOLIFY_API_TOKEN — Coolify API bearer token
#
# Usage:
#   jobs:
#     deploy:
#       uses: tonycodes/.github/.github/workflows/reusable-deploy.yml@main
#       with:
#         app_uuid: a0g0wgkgggwwsockokoowo8c
#         prod_domain: tony.codes
#       secrets:
#         COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
# =============================================================================

name: Deploy

on:
  workflow_call:
    inputs:
      runs_on:
        description: 'Runner (JSON): "ubuntu-latest" or ["self-hosted"]'
        type: string
        default: '"ubuntu-latest"'
      app_uuid:
        description: 'Coolify application UUID'
        type: string
        required: true
      coolify_url:
        description: 'Coolify API base URL (public, HTTPS)'
        type: string
        default: 'https://coolify.tony.codes'
      prod_domain:
        description: 'Production domain for health check verification'
        type: string
        required: true
      health_endpoint:
        description: 'Health check path (e.g. /health or /api/health)'
        type: string
        default: '/health'
      deploy_timeout:
        description: 'Max seconds to wait for deployment to finish'
        type: number
        default: 300
    secrets:
      COOLIFY_API_TOKEN:
        description: 'Coolify API bearer token'
        required: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ${{ fromJson(inputs.runs_on) }}
    concurrency:
      group: deploy-${{ inputs.app_uuid }}
      cancel-in-progress: false

    steps:
      - name: Trigger Coolify deployment
        id: trigger
        run: |
          RESPONSE=$(curl -sf "${{ inputs.coolify_url }}/api/v1/deploy?uuid=${{ inputs.app_uuid }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")

          echo "Response: $RESPONSE"

          DEPLOY_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid // empty')
          if [ -z "$DEPLOY_UUID" ]; then
            echo "Failed to trigger deployment"
            exit 1
          fi

          echo "deployment_uuid=$DEPLOY_UUID" >> $GITHUB_OUTPUT
          echo "Deployment triggered: $DEPLOY_UUID"

      - name: Wait for deployment
        run: |
          DEPLOY_UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          TIMEOUT=${{ inputs.deploy_timeout }}
          ELAPSED=0
          INTERVAL=10

          echo "Waiting for deployment $DEPLOY_UUID (timeout: ${TIMEOUT}s)..."

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -sf "${{ inputs.coolify_url }}/api/v1/deployments/$DEPLOY_UUID" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              | jq -r '.status // "unknown"')

            echo "[$ELAPSED/${TIMEOUT}s] Status: $STATUS"

            case "$STATUS" in
              finished)
                echo "Deployment completed successfully"
                exit 0
                ;;
              failed|cancelled|error)
                echo "Deployment failed with status: $STATUS"
                exit 1
                ;;
            esac

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Deployment timed out after ${TIMEOUT}s"
          exit 1

      - name: Verify health
        run: |
          echo "Verifying deployment..."
          sleep 5

          HEALTH=$(curl -sf "https://${{ inputs.prod_domain }}${{ inputs.health_endpoint }}" 2>/dev/null || echo "")
          if [ -z "$HEALTH" ]; then
            echo "Health endpoint not responding (may need more time)"
            exit 0
          fi

          echo "Health: $HEALTH"

          STATUS=$(echo "$HEALTH" | jq -r '.status // empty' 2>/dev/null || echo "")
          if [ "$STATUS" = "ok" ] || [ "$STATUS" = "healthy" ]; then
            echo "Health check passed"
          else
            echo "Unexpected health status: $STATUS"
          fi
